<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Inter;
    background:#031a18;
}

/* BOUTON FLOTTANT */
.chat-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:linear-gradient(135deg,#00ffd0,#00e676);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 40px rgba(0,255,200,.8);
    cursor:pointer;
    font-size:26px;
    transition:.3s;
}

.chat-toggle:hover{
    transform:scale(1.1);
}

/* FENETRE */
.chat-box{
    position:fixed;
    bottom:105px;
    right:20px;
    width:370px;
    height:560px;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(25px);
    border-radius:30px;
    box-shadow:0 0 70px rgba(0,255,200,.3);
    display:none;
    flex-direction:column;
    overflow:hidden;
    animation:pop .35s ease;
}

@keyframes pop{
from{transform:translateY(40px); opacity:0;}
to{transform:translateY(0); opacity:1;}
}

/* HEADER */
.chat-header{
    padding:18px;
    font-family:Orbitron;
    background:rgba(0,255,200,.08);
    display:flex;
    align-items:center;
    gap:12px;
    letter-spacing:1px;
}

.chat-header i{
    color:#00ffd0;
}

/* MESSAGES */
.chat-messages{
    flex:1;
    padding:16px;
    overflow-y:auto;
    color:white;
    font-size:14px;
}

.msg{
    padding:13px 14px;
    border-radius:16px;
    margin-bottom:12px;
    max-width:85%;
    animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1;}
}

.bot{
    background:rgba(255,255,255,.08);
    box-shadow:0 0 10px rgba(0,255,200,.2);
}

.user{
    background:linear-gradient(135deg,#00ffd0,#00e676);
    color:#022;
    margin-left:auto;
}

/* LOADER TYPING */
.typing{
    display:flex;
    gap:4px;
}

.typing span{
    width:6px;
    height:6px;
    background:#00ffd0;
    border-radius:50%;
    animation:bounce 1s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* INPUT */
.chat-input{
    display:flex;
    border-top:1px solid rgba(255,255,255,.1);
}

.chat-input input{
    flex:1;
    padding:14px;
    background:transparent;
    border:none;
    color:white;
    font-size:14px;
}

.chat-input button{
    border:none;
    background:none;
    color:#00ffd0;
    font-size:18px;
    padding:0 15px;
    cursor:pointer;
}

/* QUICK BUTTONS */
.quick{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

.quick button{
    background:rgba(255,255,255,.1);
    border:none;
    color:white;
    padding:7px 12px;
    border-radius:12px;
    font-size:12px;
    cursor:pointer;
    transition:.2s;
}

.quick button:hover{
    background:rgba(0,255,200,.2);
}
</style>
</head>
<body>

<div class="chat-toggle" onclick="toggleChat()">
<i class="fa-solid fa-robot"></i>
</div>

<div class="chat-box" id="chatBox">
    <div class="chat-header">
        <i class="fa-solid fa-microchip"></i>
        AGROCONNECT AI
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input id="input" placeholder="Décrivez votre besoin..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button onclick="sendMsg()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
let started=false;

function toggleChat(){
const box=document.getElementById("chatBox");
box.style.display = box.style.display==="flex" ? "none":"flex";

if(!started){
startBot();
started=true;
}
}

function addMsg(text,type="bot"){
const m=document.getElementById("messages");
m.innerHTML+=`<div class="msg ${type}">${text}</div>`;
m.scrollTop=m.scrollHeight;
}

function showTyping(){
const m=document.getElementById("messages");
m.innerHTML+=`
<div class="msg bot" id="typing">
<div class="typing">
<span></span><span></span><span></span>
</div>
</div>`;
m.scrollTop=m.scrollHeight;
}

function removeTyping(){
const t=document.getElementById("typing");
if(t) t.remove();
}

function startBot(){
addMsg("Bonjour. Je suis votre assistant agricole intelligent.");
addMsg("Je peux vous aider à analyser la météo, détecter les maladies ou accéder au marketplace.");

addMsg(`
<div class="quick">
<button onclick="sendQuick('Je veux analyser la météo')"><i class="fa-solid fa-cloud-sun"></i> Météo</button>
<button onclick="sendQuick('Mes cultures sont malades')"><i class="fa-solid fa-leaf"></i> Maladies</button>
<button onclick="sendQuick('Je veux voir la carte')"><i class="fa-solid fa-map"></i> Carte</button>
<button onclick="sendQuick('Je veux vendre mes produits')"><i class="fa-solid fa-store"></i> Marketplace</button>
<button onclick="sendQuick('Aide')"><i class="fa-solid fa-circle-question"></i> Aide</button>
</div>
`);
}

function sendQuick(text){
document.getElementById("input").value=text;
sendMsg();
}

async function sendMsg(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");
input.value="";

showTyping();

const res = await fetch("http://127.0.0.1:8000/api/chat/intention",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({question:text})
});

const data = await res.json();

removeTyping();

addMsg(data.response,"bot");
}
</script>

</body>
</html>
